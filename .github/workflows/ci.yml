name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install dependencies
        run: go mod download

      - name: Build
        run: go build ./cmd/server

      - name: Test
        run: go test ./... -v -count=1 -race

      - name: Test with coverage
        run: go test ./internal/did/ ./internal/jetstream/ ./internal/profile/ ./internal/store/ ./internal/xrpc/ -coverprofile=coverage.out -covermode=atomic

      - name: Show coverage
        run: go tool cover -func=coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t atproto-push-gateway .
